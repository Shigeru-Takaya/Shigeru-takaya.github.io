<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>flute_sonorite_ver8.1</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #151c33;
      --panel2: #1a2442;
      --text: #eaf0ff;
      --muted: #9fb0d9;
      --accent: #68d6ff;
      --accent2: #ff8fd1;
      --ok: #8dffb2;
      --warn: #ffd36a;
      --line: #314068;
      --danger: #ff8b8b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: min(1100px, 96vw);
      margin: 10px auto 28px;
    }
    .title {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 6px 0 10px;
    }
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1.2fr 0.8fr;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .row:last-child { margin-bottom: 0; }
    button {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.92rem;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    input[type="number"] {
      width: 86px;
      background: #0f1630;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.95rem;
    }
    .status {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text);
      background: #0f1630;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 78px;
      white-space: pre-line;
    }
    .mini {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .card {
      background: #0f1630;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
    }
    .card .k {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 3px;
    }
    .card .v {
      font-weight: 700;
      font-size: 1rem;
    }
    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1.55 / 1;
      background: #0c1327;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .eval {
      background: #0f1630;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.7;
      font-size: 0.95rem;
      white-space: pre-line;
      min-height: 220px;
    }
    .hint {
      color: var(--muted);
      font-size: 0.88rem;
    }
    .footer {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.84rem;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .mini { grid-template-columns: repeat(2, 1fr); }
      .canvas-wrap { aspect-ratio: 1.2 / 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">flute_sonorite_ver8.1</div>

    <div class="grid">
      <div class="panel">
        <div class="row">
          <button id="btnMic">① マイク開始</button>
          <button id="btnArm" disabled>② セッション待機</button>
          <button id="btnReset">RESET</button>
          <button id="btnPng" disabled>PNG保存</button>
          <button id="btnCsv" disabled>CSV保存</button>
        </div>

        <div class="row">
          <label>第1音[s] <input id="dur1" type="number" min="0.5" max="10" step="0.1" value="2.0"></label>
          <label>第2音[s] <input id="dur2" type="number" min="1.0" max="12" step="0.1" value="5.5"></label>
          <label>休符[s] <input id="rest" type="number" min="0.1" max="3" step="0.1" value="0.5"></label>
          <label>回数 <input id="reps" type="number" min="1" max="8" step="1" value="2"></label>
          <label>開始閾値[dB] <input id="thDb" type="number" min="-90" max="-20" step="1" value="-60"></label>
          <label>平均フレーム数 <input id="avgFrames" type="number" min="8" max="240" step="1" value="48"></label>
        </div>

        <div class="status" id="status">待機中
マイク開始 → セッション待機 → 第1音の閾値待ち → AUTO基音判定 → 2回セッション測定 → 固定比較</div>

        <div class="mini">
          <div class="card"><div class="k">状態</div><div class="v" id="modeText">IDLE</div></div>
          <div class="card"><div class="k">入力レベル</div><div class="v" id="dbText">-- dB</div></div>
          <div class="card"><div class="k">AUTO判定</div><div class="v" id="noteText">--</div></div>
          <div class="card"><div class="k">経過</div><div class="v" id="timeText">0.0 s</div></div>
        </div>

        <div class="footer">測定中はリアルタイムFFTのみ表示。終了後は第1音と第2音の平均スペクトル比較に切り替えます。</div>
      </div>

      <div class="panel">
        <div class="eval" id="evalBox">評価はセッション終了後に表示します。</div>
      </div>
    </div>

    <div class="panel" style="margin-top:10px;">
      <div class="canvas-wrap">
        <canvas id="bgCanvas"></canvas>
        <canvas id="mainCanvas"></canvas>
      </div>
      <div class="hint" style="margin-top:8px;">終了後グラフ：水色 = 第1音平均スペクトル / ピンク = 第2音平均スペクトル（第1音基音基準に整列）</div>
    </div>
  </div>

  <script>
    const CONFIG = {
      sampleRateHint: 48000,
      fftSize: 4096,
      smoothingTimeConstant: 0.0,
      minFreq: 200,
      maxFreq: 6500,
      displayMaxFreq: 6500,
      minDbDraw: -100,
      maxDbDraw: -20,
      noteA4: 442,
      detectMinFreq: 240,
      detectMaxFreq: 2400,
      harmonicCount: 10,
      detectIntervalFrames: 3,
      uiIntervalMs: 80,
      labelFont: '12px sans-serif',
      lineWidth: 2,
      compareLineWidth: 2.2,
      peakLocalWidthHz: 22,
      noiseFloorTailHz: [5000, 6500],
      pitchToleranceCents: 10,
      spectralTiltFitFromH: 2,
      spectralTiltFitToH: 8,
      freqAlignWindowSemitone: 1.4
    };

    const MODE = {
      IDLE: 'IDLE',
      READY: 'READY',
      ARMED: 'ARMED',
      AUTO_DETECT: 'AUTO_DETECT',
      SESSION: 'SESSION',
      DONE: 'DONE'
    };

    const state = {
      mode: MODE.IDLE,
      audioCtx: null,
      stream: null,
      source: null,
      analyser: null,
      freqData: null,
      timeData: null,
      sampleRate: CONFIG.sampleRateHint,
      lastUiMs: 0,
      rafId: 0,
      frameCount: 0,
      currentDb: -120,
      detectedFreq: null,
      detectedNote: '--',
      sessionStartMs: 0,
      elapsedSec: 0,
      activePhaseIndex: -1,
      phases: [],
      lastPhaseLabel: '',
      firstNoteMidi: null,
      secondNoteMidi: null,
      firstTargetFreq: null,
      secondTargetFreq: null,
      firstBins: [],
      secondBins: [],
      firstRawAvgs: [],
      secondRawAvgs: [],
      frozen: false,
      csvRows: [],
      compareReady: false,
      metrics: null,
      bgReady: false
    };

    const el = {
      btnMic: document.getElementById('btnMic'),
      btnArm: document.getElementById('btnArm'),
      btnReset: document.getElementById('btnReset'),
      btnPng: document.getElementById('btnPng'),
      btnCsv: document.getElementById('btnCsv'),
      dur1: document.getElementById('dur1'),
      dur2: document.getElementById('dur2'),
      rest: document.getElementById('rest'),
      reps: document.getElementById('reps'),
      thDb: document.getElementById('thDb'),
      avgFrames: document.getElementById('avgFrames'),
      status: document.getElementById('status'),
      modeText: document.getElementById('modeText'),
      dbText: document.getElementById('dbText'),
      noteText: document.getElementById('noteText'),
      timeText: document.getElementById('timeText'),
      evalBox: document.getElementById('evalBox'),
      bgCanvas: document.getElementById('bgCanvas'),
      mainCanvas: document.getElementById('mainCanvas')
    };

    const bgCtx = el.bgCanvas.getContext('2d');
    const ctx = el.mainCanvas.getContext('2d');

    function resizeCanvas() {
      const rect = el.mainCanvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      for (const c of [el.bgCanvas, el.mainCanvas]) {
        c.width = Math.round(rect.width * dpr);
        c.height = Math.round(rect.height * dpr);
        c.style.width = rect.width + 'px';
        c.style.height = rect.height + 'px';
      }
      bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawBackground();
      if (state.compareReady) drawComparison();
    }

    function setStatus(msg) {
      el.status.textContent = msg;
    }

    function updateMini() {
      el.modeText.textContent = state.mode;
      el.dbText.textContent = Number.isFinite(state.currentDb) ? `${state.currentDb.toFixed(1)} dB` : '-- dB';
      el.noteText.textContent = state.detectedNote || '--';
      el.timeText.textContent = `${state.elapsedSec.toFixed(1)} s`;
    }

    function getUserParams() {
      return {
        dur1: Math.max(0.5, parseFloat(el.dur1.value) || 2.0),
        dur2: Math.max(1.0, parseFloat(el.dur2.value) || 5.5),
        rest: Math.max(0.1, parseFloat(el.rest.value) || 0.5),
        reps: Math.max(1, Math.round(parseFloat(el.reps.value) || 2)),
        thDb: parseFloat(el.thDb.value) || -60,
        avgFrames: Math.max(8, Math.round(parseFloat(el.avgFrames.value) || 48))
      };
    }

    function buildPhases() {
      const p = getUserParams();
      const phases = [];
      for (let i = 0; i < p.reps; i++) {
        phases.push({ label: `第1音-${i + 1}`, type: 'FIRST', dur: p.dur1 });
        phases.push({ label: `第2音-${i + 1}`, type: 'SECOND', dur: p.dur2 });
        phases.push({ label: `休符-${i + 1}`, type: 'REST', dur: p.rest });
      }
      return phases;
    }

    async function initMic() {
      if (state.audioCtx) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          }
        });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = CONFIG.fftSize;
        analyser.smoothingTimeConstant = CONFIG.smoothingTimeConstant;
        source.connect(analyser);

        state.audioCtx = audioCtx;
        state.stream = stream;
        state.source = source;
        state.analyser = analyser;
        state.sampleRate = audioCtx.sampleRate;
        state.freqData = new Float32Array(analyser.frequencyBinCount);
        state.timeData = new Float32Array(analyser.fftSize);
        state.mode = MODE.READY;
        el.btnArm.disabled = false;
        setStatus('マイク開始完了\n「② セッション待機」を押すと第1音の閾値待ちに入ります。');
        updateMini();
        if (!state.rafId) tick();
      } catch (err) {
        setStatus('マイク開始エラー\n' + (err && err.message ? err.message : String(err)));
      }
    }

    function armSession() {
      if (!state.analyser) return;
      clearSessionData();
      state.mode = MODE.ARMED;
      state.phases = buildPhases();
      state.lastPhaseLabel = '';
      setStatus('第1音の閾値待ち\n閾値を超えるとAUTO基音判定し、そのままセッションを開始します。');
      updateMini();
    }

    function clearSessionData() {
      state.frameCount = 0;
      state.currentDb = -120;
      state.detectedFreq = null;
      state.detectedNote = '--';
      state.sessionStartMs = 0;
      state.elapsedSec = 0;
      state.activePhaseIndex = -1;
      state.firstNoteMidi = null;
      state.secondNoteMidi = null;
      state.firstTargetFreq = null;
      state.secondTargetFreq = null;
      state.firstBins = [];
      state.secondBins = [];
      state.firstRawAvgs = [];
      state.secondRawAvgs = [];
      state.frozen = false;
      state.csvRows = [];
      state.compareReady = false;
      state.metrics = null;
      el.btnPng.disabled = true;
      el.btnCsv.disabled = true;
      el.evalBox.textContent = '評価はセッション終了後に表示します。';
      clearMainCanvas();
      drawBackground();
    }

    function resetAll() {
      clearSessionData();
      state.mode = state.audioCtx ? MODE.READY : MODE.IDLE;
      setStatus(state.audioCtx
        ? '待機中\nマイクは有効です。「② セッション待機」を押してください。'
        : '待機中\nまず「① マイク開始」を押してください。');
      updateMini();
    }

    function tick(ts = performance.now()) {
      state.rafId = requestAnimationFrame(tick);
      if (!state.analyser) return;

      state.analyser.getFloatFrequencyData(state.freqData);
      state.analyser.getFloatTimeDomainData(state.timeData);
      state.currentDb = estimateLevelDb(state.timeData);
      state.frameCount++;

      if (state.mode === MODE.ARMED) {
        if (state.currentDb >= getUserParams().thDb) {
          state.mode = MODE.AUTO_DETECT;
          setStatus('AUTO基音判定中…');
        }
      }

      if (state.mode === MODE.AUTO_DETECT) {
        if (state.frameCount % CONFIG.detectIntervalFrames === 0) {
          const f0 = detectFundamentalHz(state.freqData, state.sampleRate);
          if (f0) {
            const midi = hzToMidi(f0);
            state.firstNoteMidi = midi;
            state.secondNoteMidi = midi + 1;
            state.firstTargetFreq = midiToHz(state.firstNoteMidi);
            state.secondTargetFreq = midiToHz(state.secondNoteMidi);
            state.detectedFreq = f0;
            state.detectedNote = midiToNoteNameJP(midi);
            startSession();
          }
        }
      }

      if (state.mode === MODE.SESSION) {
        updateSession();
        drawRealtimeSpectrum();
      }

      if (ts - state.lastUiMs >= CONFIG.uiIntervalMs) {
        state.lastUiMs = ts;
        updateMini();
      }
    }

    function startSession() {
      state.mode = MODE.SESSION;
      state.sessionStartMs = performance.now();
      state.elapsedSec = 0;
      state.activePhaseIndex = 0;
      setStatus(`AUTO基音判定: ${state.detectedNote} / ${state.detectedFreq.toFixed(1)} Hz\nセッション開始`);
    }

    function updateSession() {
      state.elapsedSec = (performance.now() - state.sessionStartMs) / 1000;
      const phaseInfo = getCurrentPhase(state.elapsedSec, state.phases);
      if (!phaseInfo) {
        finishSession();
        return;
      }
      state.activePhaseIndex = phaseInfo.index;
      if (state.lastPhaseLabel !== phaseInfo.phase.label) {
        state.lastPhaseLabel = phaseInfo.phase.label;
        setStatus(`測定中: ${phaseInfo.phase.label}\nAUTO基音基準: ${midiToNoteNameJP(state.firstNoteMidi)} → 半音上 ${midiToNoteNameJP(state.secondNoteMidi)}`);
      }

      if (phaseInfo.phase.type === 'FIRST' || phaseInfo.phase.type === 'SECOND') {
        const rawCopy = new Float32Array(state.freqData);
        const store = phaseInfo.phase.type === 'FIRST' ? state.firstBins : state.secondBins;
        store.push(rawCopy);
        if (store.length > getUserParams().avgFrames) store.shift();
      }
    }

    function finishSession() {
      state.mode = MODE.DONE;
      clearMainCanvas();
      buildComparisonAndMetrics();
      drawComparison();
      renderEvaluation();
      el.btnPng.disabled = false;
      el.btnCsv.disabled = false;
      setStatus(`セッション終了\n第1音と第2音の平均スペクトルを固定比較表示しています。`);
      updateMini();
    }

    function getCurrentPhase(elapsed, phases) {
      let acc = 0;
      for (let i = 0; i < phases.length; i++) {
        const next = acc + phases[i].dur;
        if (elapsed < next) {
          return { index: i, phase: phases[i], localTime: elapsed - acc, remaining: next - elapsed };
        }
        acc = next;
      }
      return null;
    }

    function estimateLevelDb(timeData) {
      let sum = 0;
      for (let i = 0; i < timeData.length; i++) sum += timeData[i] * timeData[i];
      const rms = Math.sqrt(sum / timeData.length) + 1e-12;
      return 20 * Math.log10(rms);
    }

    function binToHz(bin, sampleRate = state.sampleRate) {
      return bin * sampleRate / CONFIG.fftSize;
    }

    function hzToBin(hz, sampleRate = state.sampleRate) {
      return Math.round(hz * CONFIG.fftSize / sampleRate);
    }

    function hzToMidi(hz) {
      return Math.round(69 + 12 * Math.log2(hz / CONFIG.noteA4));
    }

    function midiToHz(midi) {
      return CONFIG.noteA4 * Math.pow(2, (midi - 69) / 12);
    }

    function midiToNoteNameJP(midi) {
      const names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
      const n = ((midi % 12) + 12) % 12;
      const oct = Math.floor(midi / 12) - 1;
      return `${names[n]}${oct}`;
    }

    function centsDiff(freq, ref) {
      return 1200 * Math.log2(freq / ref);
    }

    function detectFundamentalHz(freqData, sampleRate) {
      const minBin = Math.max(2, hzToBin(CONFIG.detectMinFreq, sampleRate));
      const maxBin = Math.min(freqData.length - 2, hzToBin(CONFIG.detectMaxFreq, sampleRate));
      let bestScore = -Infinity;
      let bestBin = null;

      for (let b = minBin; b <= maxBin; b++) {
        const amp = dbToAmp(freqData[b]);
        if (amp <= 0) continue;
        let score = amp * 1.2;
        for (let h = 2; h <= 6; h++) {
          const hb = b * h;
          if (hb >= freqData.length) break;
          score += dbToAmp(freqData[hb]) * (1 / h);
        }
        if (score > bestScore) {
          bestScore = score;
          bestBin = b;
        }
      }
      if (!bestBin) return null;

      const refined = parabolicInterpBin(freqData, bestBin);
      const hz = refined * sampleRate / CONFIG.fftSize;
      return (hz >= CONFIG.detectMinFreq && hz <= CONFIG.detectMaxFreq) ? hz : null;
    }

    function parabolicInterpBin(arr, i) {
      if (i <= 0 || i >= arr.length - 1) return i;
      const y1 = arr[i - 1], y2 = arr[i], y3 = arr[i + 1];
      const denom = (y1 - 2 * y2 + y3);
      if (Math.abs(denom) < 1e-12) return i;
      return i + 0.5 * (y1 - y3) / denom;
    }

    function dbToAmp(db) {
      if (!Number.isFinite(db)) return 0;
      return Math.pow(10, db / 20);
    }

    function averageFrames(frames) {
      if (!frames.length) return null;
      const out = new Float32Array(frames[0].length);
      for (const fr of frames) {
        for (let i = 0; i < out.length; i++) out[i] += fr[i];
      }
      for (let i = 0; i < out.length; i++) out[i] /= frames.length;
      return out;
    }

    function buildComparisonAndMetrics() {
      const avg1 = averageFrames(state.firstBins);
      const avg2 = averageFrames(state.secondBins);
      if (!avg1 || !avg2) {
        state.compareReady = false;
        state.metrics = null;
        el.evalBox.textContent = '比較に必要なデータが不足しています。閾値や吹奏時間を見直してください。';
        return;
      }
      state.firstRawAvgs = avg1;
      state.secondRawAvgs = avg2;

      const targetHz1 = state.firstTargetFreq;
      const targetHz2 = state.secondTargetFreq;

      const aligned2 = alignSpectrumToReference(avg2, targetHz2, targetHz1, state.sampleRate);
      state.compareReady = true;

      const m1 = extractMetrics(avg1, targetHz1, state.sampleRate, '第1音');
      const m2 = extractMetrics(aligned2, targetHz1, state.sampleRate, '第2音');
      state.metrics = { one: m1, two: m2, targetHz1, targetHz2 };

      state.csvRows = buildCsvRows(avg1, aligned2, targetHz1, targetHz2, m1, m2);
    }

    function alignSpectrumToReference(src, srcHz, refHz, sampleRate) {
      const ratio = srcHz / refHz;
      const out = new Float32Array(src.length);
      for (let i = 0; i < out.length; i++) {
        const refFreq = binToHz(i, sampleRate);
        if (refFreq <= 0) { out[i] = src[i] || -120; continue; }
        const srcFreq = refFreq * ratio;
        const srcBin = srcFreq * CONFIG.fftSize / sampleRate;
        out[i] = sampleDbLinear(src, srcBin);
      }
      return out;
    }

    function sampleDbLinear(arr, idx) {
      if (idx <= 0) return arr[0];
      const i0 = Math.floor(idx);
      const i1 = Math.min(arr.length - 1, i0 + 1);
      const t = idx - i0;
      const a0 = dbToAmp(arr[Math.max(0, i0)]);
      const a1 = dbToAmp(arr[i1]);
      const amp = a0 * (1 - t) + a1 * t;
      return 20 * Math.log10(amp + 1e-12);
    }

    function extractMetrics(avgDb, baseHz, sampleRate, label) {
      const harmonics = [];
      const harmonicDb = [];
      let pitchHz = null;
      for (let h = 1; h <= CONFIG.harmonicCount; h++) {
        const center = baseHz * h;
        if (center > CONFIG.maxFreq) break;
        const peak = findLocalPeak(avgDb, center, CONFIG.peakLocalWidthHz, sampleRate);
        if (h === 1) pitchHz = peak.freq;
        harmonics.push(peak);
        harmonicDb.push(peak.db);
      }

      const even = [];
      const odd = [];
      for (let i = 0; i < harmonics.length; i++) {
        const hnum = i + 1;
        if (hnum % 2 === 0) even.push({ x: Math.log2(hnum), y: harmonics[i].db });
        else odd.push({ x: Math.log2(hnum), y: harmonics[i].db });
      }

      const oddSlope = linearSlope(odd);
      const evenSlope = linearSlope(even);
      const pitchCent = pitchHz ? centsDiff(pitchHz, baseHz) : null;
      const brightnessDb = harmonics.length >= 3 ? (harmonics[2].db - harmonics[0].db) : null;
      const noiseFloor = estimateNoiseFloor(avgDb, sampleRate);
      const harmonicMean = harmonicDb.length ? harmonicDb.reduce((a, b) => a + b, 0) / harmonicDb.length : -120;
      const noiseGap = harmonicMean - noiseFloor;
      const timbreDistance = harmonicDb.length ? spectralShapeSpread(harmonicDb) : null;

      return {
        label,
        pitchHz,
        pitchCent,
        harmonics,
        oddSlope,
        evenSlope,
        noiseFloor,
        noiseGap,
        brightnessDb,
        timbreDistance
      };
    }

    function findLocalPeak(avgDb, centerHz, widthHz, sampleRate) {
      const centerBin = centerHz * CONFIG.fftSize / sampleRate;
      const w = Math.max(1, Math.round(widthHz * CONFIG.fftSize / sampleRate));
      let bestBin = Math.max(1, Math.round(centerBin));
      let bestDb = -999;
      const i0 = Math.max(1, Math.round(centerBin) - w);
      const i1 = Math.min(avgDb.length - 2, Math.round(centerBin) + w);
      for (let i = i0; i <= i1; i++) {
        if (avgDb[i] > bestDb) {
          bestDb = avgDb[i];
          bestBin = i;
        }
      }
      const refined = parabolicInterpBin(avgDb, bestBin);
      const freq = refined * sampleRate / CONFIG.fftSize;
      const db = sampleDbLinear(avgDb, refined);
      return { freq, db };
    }

    function linearSlope(points) {
      if (points.length < 2) return null;
      let sx = 0, sy = 0, sxx = 0, sxy = 0;
      for (const p of points) {
        sx += p.x; sy += p.y; sxx += p.x * p.x; sxy += p.x * p.y;
      }
      const n = points.length;
      const denom = n * sxx - sx * sx;
      if (Math.abs(denom) < 1e-12) return null;
      return (n * sxy - sx * sy) / denom;
    }

    function estimateNoiseFloor(avgDb, sampleRate) {
      const b0 = hzToBin(CONFIG.noiseFloorTailHz[0], sampleRate);
      const b1 = Math.min(avgDb.length - 1, hzToBin(CONFIG.noiseFloorTailHz[1], sampleRate));
      const vals = [];
      for (let i = b0; i <= b1; i++) vals.push(avgDb[i]);
      vals.sort((a, b) => a - b);
      if (!vals.length) return -120;
      return vals[Math.floor(vals.length * 0.7)];
    }

    function spectralShapeSpread(harmonicDb) {
      const ref = harmonicDb[0];
      const diffs = harmonicDb.map(v => v - ref);
      const mean = diffs.reduce((a, b) => a + b, 0) / diffs.length;
      let sum = 0;
      for (const d of diffs) sum += (d - mean) ** 2;
      return Math.sqrt(sum / diffs.length);
    }

    function renderEvaluation() {
      if (!state.metrics) return;
      const { one, two, targetHz1, targetHz2 } = state.metrics;
      const lines = [];
      lines.push(`基準判定: 第1音 ${midiToNoteNameJP(state.firstNoteMidi)} (${targetHz1.toFixed(2)} Hz)`);
      lines.push(`半音上候補: 第2音 ${midiToNoteNameJP(state.secondNoteMidi)} (${targetHz2.toFixed(2)} Hz)`);
      lines.push('');
      lines.push(formatMetricBlock('第1音', one));
      lines.push('');
      lines.push(formatMetricBlock('第2音（第1音基準に周波数整列して比較）', two));
      lines.push('');
      lines.push('差分（第2音 - 第1音）');
      lines.push(`ピッチ差[cent]: ${formatNum((two.pitchCent ?? 0) - (one.pitchCent ?? 0), 2)}`);
      lines.push(`音色散らばり差[dB]: ${formatNum((two.timbreDistance ?? 0) - (one.timbreDistance ?? 0), 2)}`);
      lines.push(`偶数次系列勾配差: ${formatNum((two.evenSlope ?? 0) - (one.evenSlope ?? 0), 3)}`);
      lines.push(`奇数次系列勾配差: ${formatNum((two.oddSlope ?? 0) - (one.oddSlope ?? 0), 3)}`);
      lines.push(`ノイズギャップ差[dB]: ${formatNum((two.noiseGap ?? 0) - (one.noiseGap ?? 0), 2)}`);
      el.evalBox.textContent = lines.join('\n');
    }

    function formatMetricBlock(title, m) {
      return `${title}\n` +
        `  ピッチ: ${formatNum(m.pitchHz, 2)} Hz / ${formatNum(m.pitchCent, 2)} cent\n` +
        `  音色散らばり: ${formatNum(m.timbreDistance, 2)} dB\n` +
        `  偶数次系列勾配: ${formatNum(m.evenSlope, 3)}\n` +
        `  奇数次系列勾配: ${formatNum(m.oddSlope, 3)}\n` +
        `  ノイズ床: ${formatNum(m.noiseFloor, 2)} dB\n` +
        `  ノイズギャップ: ${formatNum(m.noiseGap, 2)} dB`;
    }

    function formatNum(v, d = 2) {
      return Number.isFinite(v) ? Number(v).toFixed(d) : '--';
    }

    function buildCsvRows(avg1, avg2Aligned, target1, target2, m1, m2) {
      const rows = [];
      rows.push(['meta', 'first_target_hz', target1.toFixed(6)]);
      rows.push(['meta', 'second_target_hz', target2.toFixed(6)]);
      rows.push(['metric', 'first_pitch_hz', formatNum(m1.pitchHz, 6)]);
      rows.push(['metric', 'first_pitch_cent', formatNum(m1.pitchCent, 6)]);
      rows.push(['metric', 'first_timbre_distance_db', formatNum(m1.timbreDistance, 6)]);
      rows.push(['metric', 'first_even_slope', formatNum(m1.evenSlope, 6)]);
      rows.push(['metric', 'first_odd_slope', formatNum(m1.oddSlope, 6)]);
      rows.push(['metric', 'first_noise_gap_db', formatNum(m1.noiseGap, 6)]);
      rows.push(['metric', 'second_pitch_hz', formatNum(m2.pitchHz, 6)]);
      rows.push(['metric', 'second_pitch_cent', formatNum(m2.pitchCent, 6)]);
      rows.push(['metric', 'second_timbre_distance_db', formatNum(m2.timbreDistance, 6)]);
      rows.push(['metric', 'second_even_slope', formatNum(m2.evenSlope, 6)]);
      rows.push(['metric', 'second_odd_slope', formatNum(m2.oddSlope, 6)]);
      rows.push(['metric', 'second_noise_gap_db', formatNum(m2.noiseGap, 6)]);
      rows.push(['freq_hz', 'first_avg_db', 'second_avg_aligned_db']);
      const minBin = hzToBin(CONFIG.minFreq, state.sampleRate);
      const maxBin = Math.min(avg1.length - 1, hzToBin(CONFIG.maxFreq, state.sampleRate));
      for (let i = minBin; i <= maxBin; i++) {
        rows.push([binToHz(i, state.sampleRate).toFixed(3), avg1[i].toFixed(4), avg2Aligned[i].toFixed(4)]);
      }
      return rows;
    }

    function drawBackground() {
      const w = el.bgCanvas.clientWidth;
      const h = el.bgCanvas.clientHeight;
      bgCtx.clearRect(0, 0, w, h);
      bgCtx.fillStyle = '#0c1327';
      bgCtx.fillRect(0, 0, w, h);
      bgCtx.strokeStyle = 'rgba(180, 205, 255, 0.14)';
      bgCtx.lineWidth = 1;
      bgCtx.font = '12px sans-serif';
      bgCtx.fillStyle = 'rgba(220,230,255,0.7)';

      const freqs = [250, 500, 1000, 2000, 3000, 4000, 5000, 6500];
      for (const f of freqs) {
        const x = mapFreqToX(f, w);
        bgCtx.beginPath();
        bgCtx.moveTo(x, 0);
        bgCtx.lineTo(x, h);
        bgCtx.stroke();
        bgCtx.fillText(String(f), Math.min(w - 32, x + 4), h - 8);
      }
      const dbs = [-100, -90, -80, -70, -60, -50, -40, -30, -20];
      for (const d of dbs) {
        const y = mapDbToY(d, h);
        bgCtx.beginPath();
        bgCtx.moveTo(0, y);
        bgCtx.lineTo(w, y);
        bgCtx.stroke();
        bgCtx.fillText(`${d} dB`, 6, Math.max(12, y - 3));
      }
      state.bgReady = true;
    }

    function clearMainCanvas() {
      const w = el.mainCanvas.clientWidth;
      const h = el.mainCanvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
    }

    function mapFreqToX(freq, width) {
      const minF = CONFIG.minFreq;
      const maxF = CONFIG.maxFreq;
      const r = (Math.log(freq) - Math.log(minF)) / (Math.log(maxF) - Math.log(minF));
      return Math.max(0, Math.min(width, r * width));
    }

    function mapDbToY(db, height) {
      const r = (db - CONFIG.minDbDraw) / (CONFIG.maxDbDraw - CONFIG.minDbDraw);
      return height - r * height;
    }

    function drawRealtimeSpectrum() {
      const w = el.mainCanvas.clientWidth;
      const h = el.mainCanvas.clientHeight;
      clearMainCanvas();
      ctx.lineWidth = CONFIG.lineWidth;
      ctx.strokeStyle = 'rgba(104, 214, 255, 0.95)';
      ctx.beginPath();
      let started = false;
      const minBin = hzToBin(CONFIG.minFreq, state.sampleRate);
      const maxBin = Math.min(state.freqData.length - 1, hzToBin(CONFIG.maxFreq, state.sampleRate));
      for (let i = minBin; i <= maxBin; i++) {
        const f = binToHz(i, state.sampleRate);
        const x = mapFreqToX(f, w);
        const y = mapDbToY(state.freqData[i], h);
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      if (state.mode === MODE.SESSION && state.activePhaseIndex >= 0) {
        const phase = state.phases[state.activePhaseIndex];
        ctx.fillStyle = 'rgba(234,240,255,0.92)';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText(phase.label, 12, 20);
      }
    }

    function drawComparison() {
      if (!state.compareReady || !state.metrics) return;
      const w = el.mainCanvas.clientWidth;
      const h = el.mainCanvas.clientHeight;
      clearMainCanvas();

      const avg1 = state.firstRawAvgs;
      const avg2 = alignSpectrumToReference(state.secondRawAvgs, state.secondTargetFreq, state.firstTargetFreq, state.sampleRate);

      drawLineSpectrum(avg1, 'rgba(104, 214, 255, 0.98)', CONFIG.compareLineWidth);
      drawLineSpectrum(avg2, 'rgba(255, 143, 209, 0.98)', CONFIG.compareLineWidth);
      drawHarmonicLabels(state.metrics.one.harmonics, 'rgba(104, 214, 255, 0.95)');
      drawHarmonicLabels(state.metrics.two.harmonics, 'rgba(255, 143, 209, 0.95)', true);

      ctx.fillStyle = 'rgba(235,242,255,0.95)';
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText('水色: 第1音平均', 12, 18);
      ctx.fillText('ピンク: 第2音平均（第1音基準へ整列）', 12, 36);

      function drawLineSpectrum(arr, color, lineWidth) {
        ctx.lineWidth = lineWidth;
        ctx.strokeStyle = color;
        ctx.beginPath();
        let started = false;
        const minBin = hzToBin(CONFIG.minFreq, state.sampleRate);
        const maxBin = Math.min(arr.length - 1, hzToBin(CONFIG.maxFreq, state.sampleRate));
        for (let i = minBin; i <= maxBin; i++) {
          const f = binToHz(i, state.sampleRate);
          const x = mapFreqToX(f, w);
          const y = mapDbToY(arr[i], h);
          if (!started) { ctx.moveTo(x, y); started = true; }
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      function drawHarmonicLabels(harmonics, color, lower = false) {
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.font = '12px sans-serif';
        harmonics.forEach((p, idx) => {
          const f = p.freq;
          if (f < CONFIG.minFreq || f > CONFIG.maxFreq) return;
          const x = mapFreqToX(f, w);
          const y = mapDbToY(p.db, h);
          const ty = Math.max(16, Math.min(h - 10, y + (lower ? 18 : -10) + (idx % 2) * (lower ? 10 : -10)));
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + 8, ty - 8);
          ctx.stroke();
          ctx.fillText(`${idx + 1}H`, x + 10, ty);
        });
      }
    }

    function downloadCsv() {
      if (!state.csvRows.length) return;
      const csv = state.csvRows.map(row => row.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `flute_sonorite_ver8_1_${timestampFile()}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function downloadPng() {
      const merged = document.createElement('canvas');
      merged.width = el.bgCanvas.width;
      merged.height = el.bgCanvas.height;
      const mctx = merged.getContext('2d');
      mctx.drawImage(el.bgCanvas, 0, 0);
      mctx.drawImage(el.mainCanvas, 0, 0);
      const a = document.createElement('a');
      a.href = merged.toDataURL('image/png');
      a.download = `flute_sonorite_ver8_1_${timestampFile()}.png`;
      a.click();
    }

    function timestampFile() {
      const d = new Date();
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
    }

    el.btnMic.addEventListener('click', initMic);
    el.btnArm.addEventListener('click', armSession);
    el.btnReset.addEventListener('click', resetAll);
    el.btnCsv.addEventListener('click', downloadCsv);
    el.btnPng.addEventListener('click', downloadPng);
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    updateMini();
  </script>
</body>
</html>
